<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f0f1a; color: white; height: 100vh; display: flex; flex-direction: column; }
#header { background: #1a1a2e; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #4fc3f7; display: flex; justify-content: space-between; align-items: center; }
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.msg-user { background: #1565c0; padding: 10px 15px; border-radius: 18px 18px 0 18px; align-self: flex-end; max-width: 80%; }
.msg-ia { background: #1a1a2e; padding: 10px 15px; border-radius: 18px 18px 18px 0; align-self: flex-start; max-width: 80%; border: 1px solid #333; white-space: pre-wrap; }
#bottom { background: #1a1a2e; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; }
#input { flex: 1; background: #0f0f1a; border: 1px solid #333; border-radius: 25px; padding: 12px 18px; color: white; font-size: 16px; outline: none; }
#btn { background: #1565c0; border: none; border-radius: 50%; width: 48px; height: 48px; color: white; font-size: 20px; cursor: pointer; }
#gmail-btn { background: #c62828; border: none; border-radius: 20px; padding: 8px 15px; color: white; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div id="header">
  <span>🤖 Assistant IA</span>
  <button id="gmail-btn" onclick="connectGmail()">📧 Connecter Gmail</button>
</div>
<div id="chat">
  <div class="msg-ia">Bonjour ! Connectez votre Gmail pour commencer.</div>
</div>
<div id="bottom">
  <input id="input" type="text" placeholder="Votre message..." />
  <button id="btn" onclick="send()">➤</button>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const GEMINI_KEY = "AIzaSyA5S1nT6X__H4b7fTUGWAmlLUoplz-TKxs";
const CLIENT_ID = "444306649961-vh9j1o3dkvkkje88ubcbp5u0cc32m85e.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/calendar";

let accessToken = null;
let tokenClient = null;

window.onload = function() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (response) => {
      accessToken = response.access_token;
      addMessage("ia", "✅ Gmail connecté ! Demandez à lire vos emails ou votre agenda.");
      document.getElementById('gmail-btn').textContent = "✅ Connecté";
      document.getElementById('gmail-btn').style.background = "#2e7d32";
    }
  });
};

function connectGmail() {
  tokenClient.requestAccessToken();
}

async function getEmails() {
  const res = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=5&q=is:unread", {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  if (!data.messages) return "Aucun email non lu.";
  let emails = [];
  for (const msg of data.messages.slice(0, 3)) {
    const detail = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${msg.id}`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const d = await detail.json();
    const subject = d.payload.headers.find(h => h.name === "Subject")?.value || "Sans sujet";
    const from = d.payload.headers.find(h => h.name === "From")?.value || "Inconnu";
    emails.push(`De: ${from}\nSujet: ${subject}`);
  }
  return emails.join("\n\n");
}

async function getCalendar() {
  const now = new Date().toISOString();
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&maxResults=5&singleEvents=true&orderBy=startTime`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  if (!data.items || data.items.length === 0) return "Aucun événement à venir.";
  return data.items.map(e => `${e.summary} — ${e.start.dateTime || e.start.date}`).join("\n");
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  addMessage("user", msg);
  input.value = '';
  addMessage("ia", "⏳ En train de répondre...", "typing");

  let context = msg;

  if (accessToken) {
    if (msg.toLowerCase().includes("email") || msg.toLowerCase().includes("mail")) {
      const emails = await getEmails();
      context = `Voici mes emails non lus:\n${emails}\n\nDemande: ${msg}`;
    }
    if (msg.toLowerCase().includes("agenda") || msg.toLowerCase().includes("calendrier") || msg.toLowerCase().includes("réunion")) {
      const events = await getCalendar();
      context = `Voici mes prochains événements:\n${events}\n\nDemande: ${msg}`;
    }
  }

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
    });
    const data = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Pas de réponse, réessayez.";
    document.getElementById('typing').outerHTML = `<div class="msg-ia">${reply}</div>`;
  } catch(e) {
    document.getElementById('typing').outerHTML = `<div class="msg-ia">❌ Erreur: ${e.message}</div>`;
  }

  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function addMessage(type, text, id = "") {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = type === "user" ? "msg-user" : "msg-ia";
  div.textContent = text;
  if (id) div.id = id;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById('input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
