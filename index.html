<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant IA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f0f1a; color: white; height: 100vh; display: flex; flex-direction: column; }
#header { background: #1a1a2e; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #4fc3f7; }
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.msg-user { background: #1565c0; padding: 10px 15px; border-radius: 18px 18px 0 18px; align-self: flex-end; max-width: 80%; }
.msg-ia { background: #1a1a2e; padding: 10px 15px; border-radius: 18px 18px 18px 0; align-self: flex-start; max-width: 80%; border: 1px solid #333; }
#bottom { background: #1a1a2e; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; }
#input { flex: 1; background: #0f0f1a; border: 1px solid #333; border-radius: 25px; padding: 12px 18px; color: white; font-size: 16px; outline: none; }
#btn { background: #1565c0; border: none; border-radius: 50%; width: 48px; height: 48px; color: white; font-size: 20px; cursor: pointer; }
#btn:active { background: #0d47a1; }
</style>
</head>
<body>
<div id="header">🤖 Assistant IA</div>
<div id="chat">
  <div class="msg-ia">Bonjour ! Comment puis-je vous aider ?</div>
</div>
<div id="bottom">
  <input id="input" type="text" placeholder="Votre message..." />
  <button id="btn" onclick="send()">➤</button>
</div>
<script>
const API_KEY = "METS_TA_CLE_ICI";

async function send() {
  const input = document.getElementById('input');
  const chat = document.getElementById('chat');
  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="msg-user">${msg}</div>`;
  input.value = '';
  chat.innerHTML += `<div class="msg-ia" id="typing">⏳ En train de répondre...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
    });
    const data = await res.json();
    const reply = data.candidates[0].content.parts[0].text;
    document.getElementById('typing').outerHTML = `<div class="msg-ia">${reply}</div>`;
  } catch(e) {
    document.getElementById('typing').outerHTML = `<div class="msg-ia">❌ Erreur : ${e.message}</div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}

document.getElementById('input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
